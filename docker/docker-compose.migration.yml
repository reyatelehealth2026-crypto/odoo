# Docker Compose for Parallel Deployment Migration
# Purpose: Deploy new system alongside existing PHP system
# Requirements: TC-3.1

version: '3.8'

services:
  # Legacy PHP System (existing)
  legacy-web:
    build:
      context: ../
      dockerfile: docker/legacy/Dockerfile
    container_name: legacy-web
    ports:
      - "8080:80"
    volumes:
      - ../:/var/www/html
      - ./legacy/php.ini:/usr/local/etc/php/php.ini
    environment:
      - PHP_ENV=production
      - MYSQL_HOST=mysql
      - MYSQL_DATABASE=telepharmacy
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mysql
      - redis
    networks:
      - migration-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.legacy.rule=Host(`legacy.telepharmacy.local`)"
      - "traefik.http.services.legacy.loadbalancer.server.port=80"

  # New Node.js Backend
  modern-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: modern-backend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/telepharmacy
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - ODOO_API_URL=${ODOO_API_URL}
      - LEGACY_SYSTEM_URL=http://legacy-web:80
    depends_on:
      - mysql
      - redis
      - legacy-web
    networks:
      - migration-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.modern-backend.rule=Host(`api.telepharmacy.local`)"
      - "traefik.http.services.modern-backend.loadbalancer.server.port=4000"

  # New Next.js Frontend
  modern-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: modern-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://modern-backend:4000
      - NEXT_PUBLIC_WS_URL=ws://websocket:3001
      - NEXT_PUBLIC_LEGACY_URL=http://legacy-web:80
    depends_on:
      - modern-backend
    networks:
      - migration-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.modern-frontend.rule=Host(`app.telepharmacy.local`)"
      - "traefik.http.services.modern-frontend.loadbalancer.server.port=3000"

  # WebSocket Server
  websocket:
    build:
      context: ../websocket
      dockerfile: Dockerfile
    container_name: websocket-server
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://modern-frontend:3000,http://legacy-web:80
    depends_on:
      - redis
    networks:
      - migration-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.websocket.rule=Host(`ws.telepharmacy.local`)"
      - "traefik.http.services.websocket.loadbalancer.server.port=3001"

  # Load Balancer with Traffic Splitting
  traefik:
    image: traefik:v2.10
    container_name: migration-loadbalancer
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
    ports:
      - "80:80"
      - "443:443"
      - "8081:8080" # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./traefik/letsencrypt:/letsencrypt
    networks:
      - migration-network
    depends_on:
      - legacy-web
      - modern-backend
      - modern-frontend

  # MySQL Database (shared)
  mysql:
    image: mysql:8.0
    container_name: migration-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=telepharmacy
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_CHARSET=utf8mb4
      - MYSQL_COLLATION=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database/migrations:/docker-entrypoint-initdb.d
      - ./mysql/my.cnf:/etc/mysql/conf.d/custom.cnf
    ports:
      - "3306:3306"
    networks:
      - migration-network
    command: --default-time-zone='+07:00'

  # Redis (shared)
  redis:
    image: redis:7-alpine
    container_name: migration-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - migration-network

  # Data Synchronization Service
  data-sync:
    build:
      context: ../migration
      dockerfile: Dockerfile.sync
    container_name: data-sync-service
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/telepharmacy
      - REDIS_URL=redis://redis:6379
      - LEGACY_API_URL=http://legacy-web:80/api
      - MODERN_API_URL=http://modern-backend:4000/api/v1
      - SYNC_INTERVAL=30000 # 30 seconds
    depends_on:
      - mysql
      - redis
      - legacy-web
      - modern-backend
    networks:
      - migration-network
    restart: unless-stopped

  # Migration Monitoring
  migration-monitor:
    build:
      context: ../migration
      dockerfile: Dockerfile.monitor
    container_name: migration-monitor
    ports:
      - "9090:9090"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/telepharmacy
      - REDIS_URL=redis://redis:6379
      - LEGACY_API_URL=http://legacy-web:80
      - MODERN_API_URL=http://modern-backend:4000
    depends_on:
      - mysql
      - redis
      - legacy-web
      - modern-backend
    networks:
      - migration-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.monitor.rule=Host(`monitor.telepharmacy.local`)"
      - "traefik.http.services.monitor.loadbalancer.server.port=9090"

  # Nginx for Static Files and Additional Routing
  nginx:
    image: nginx:alpine
    container_name: migration-nginx
    volumes:
      - ./nginx/migration.conf:/etc/nginx/conf.d/default.conf
      - ../uploads:/var/www/uploads
      - ../assets:/var/www/assets
    ports:
      - "8082:80"
    depends_on:
      - legacy-web
      - modern-frontend
    networks:
      - migration-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  migration-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
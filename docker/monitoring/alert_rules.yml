# Prometheus Alert Rules for Odoo Dashboard
# Defines alerting conditions for performance and error thresholds

groups:
  - name: odoo_dashboard_alerts
    rules:
      # High Error Rate Alert
      - alert: HighErrorRate
        expr: |
          (
            rate(http_requests_total{status=~"5.."}[5m]) /
            rate(http_requests_total[5m])
          ) * 100 > 3
        for: 2m
        labels:
          severity: critical
          service: "{{ $labels.job }}"
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }}% for service {{ $labels.job }}, which exceeds the 3% threshold"

      # High Response Time Alert
      - alert: HighResponseTime
        expr: |
          histogram_quantile(0.95, 
            rate(http_request_duration_seconds_bucket[5m])
          ) > 1.0
        for: 3m
        labels:
          severity: warning
          service: "{{ $labels.job }}"
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }}s for service {{ $labels.job }}, exceeding 1s threshold"

      # API Response Time Critical
      - alert: APIResponseTimeCritical
        expr: |
          histogram_quantile(0.95, 
            rate(http_request_duration_seconds_bucket{job="backend-api"}[5m])
          ) > 0.3
        for: 2m
        labels:
          severity: critical
          service: backend-api
        annotations:
          summary: "API response time critical"
          description: "Backend API 95th percentile response time is {{ $value }}s, exceeding 300ms threshold"

      # Service Down Alert
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
          service: "{{ $labels.job }}"
        annotations:
          summary: "Service is down"
          description: "Service {{ $labels.job }} has been down for more than 1 minute"

      # High Memory Usage
      - alert: HighMemoryUsage
        expr: |
          (
            (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / 
            node_memory_MemTotal_bytes
          ) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}%, exceeding 85% threshold"

      # High CPU Usage
      - alert: HighCPUUsage
        expr: |
          100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}%, exceeding 80% threshold"

      # Database Connection Issues
      - alert: DatabaseConnectionHigh
        expr: |
          mysql_global_status_threads_connected / mysql_global_variables_max_connections * 100 > 80
        for: 2m
        labels:
          severity: warning
          service: mysql
        annotations:
          summary: "High database connections"
          description: "Database connections are at {{ $value }}% of maximum capacity"

      # Redis Memory Usage High
      - alert: RedisMemoryHigh
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes * 100 > 80
        for: 3m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "High Redis memory usage"
          description: "Redis memory usage is {{ $value }}%, exceeding 80% threshold"

      # Disk Space Low
      - alert: DiskSpaceLow
        expr: |
          (
            (node_filesystem_size_bytes{fstype!="tmpfs"} - node_filesystem_free_bytes{fstype!="tmpfs"}) /
            node_filesystem_size_bytes{fstype!="tmpfs"}
          ) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space"
          description: "Disk usage is {{ $value }}% on {{ $labels.mountpoint }}, exceeding 85% threshold"

      # WebSocket Connection Issues
      - alert: WebSocketConnectionsHigh
        expr: websocket_connections_active > 1000
        for: 2m
        labels:
          severity: warning
          service: websocket
        annotations:
          summary: "High WebSocket connections"
          description: "WebSocket connections are {{ $value }}, exceeding 1000 threshold"

      # Cache Hit Rate Low
      - alert: CacheHitRateLow
        expr: |
          (
            rate(cache_hits_total[5m]) /
            (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m]))
          ) * 100 < 85
        for: 5m
        labels:
          severity: warning
          service: cache
        annotations:
          summary: "Low cache hit rate"
          description: "Cache hit rate is {{ $value }}%, below 85% threshold"

      # Dashboard Load Time High
      - alert: DashboardLoadTimeHigh
        expr: |
          histogram_quantile(0.95, 
            rate(dashboard_page_load_duration_seconds_bucket[5m])
          ) > 1.0
        for: 3m
        labels:
          severity: warning
          service: frontend
        annotations:
          summary: "High dashboard load time"
          description: "Dashboard load time 95th percentile is {{ $value }}s, exceeding 1s threshold"

  - name: business_metrics_alerts
    rules:
      # Order Processing Delays
      - alert: OrderProcessingDelay
        expr: |
          avg_over_time(order_processing_duration_seconds[10m]) > 300
        for: 5m
        labels:
          severity: warning
          service: order-processing
        annotations:
          summary: "Order processing delays detected"
          description: "Average order processing time is {{ $value }}s, exceeding 5 minute threshold"

      # Payment Processing Failures
      - alert: PaymentProcessingFailures
        expr: |
          rate(payment_processing_failures_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
          service: payment-processing
        annotations:
          summary: "High payment processing failure rate"
          description: "Payment processing failure rate is {{ $value }} per second"

      # Webhook Processing Failures
      - alert: WebhookProcessingFailures
        expr: |
          rate(webhook_processing_failures_total[5m]) > 0.05
        for: 3m
        labels:
          severity: warning
          service: webhook-processing
        annotations:
          summary: "Webhook processing failures detected"
          description: "Webhook processing failure rate is {{ $value }} per second"
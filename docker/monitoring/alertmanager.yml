# Alertmanager Configuration for Odoo Dashboard
# Handles alert routing and notification delivery

global:
  smtp_smarthost: '${SMTP_HOST}:${SMTP_PORT}'
  smtp_from: '${ALERT_FROM_EMAIL}'
  smtp_auth_username: '${SMTP_USERNAME}'
  smtp_auth_password: '${SMTP_PASSWORD}'

# Inhibition rules allow to mute a set of alerts given that another alert is firing
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']

# Route tree for alerts
route:
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default-receiver'
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 5m
      
    # Warning alerts - less frequent notifications
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 2m
      repeat_interval: 1h
      
    # Business metrics alerts
    - match_re:
        service: '(order-processing|payment-processing|webhook-processing)'
      receiver: 'business-alerts'
      group_wait: 1m
      repeat_interval: 30m

# Notification receivers
receivers:
  - name: 'default-receiver'
    email_configs:
      - to: '${DEFAULT_ALERT_EMAIL}'
        subject: '[Odoo Dashboard] Alert: {{ .GroupLabels.alertname }}'
        body: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Service: {{ .Labels.service }}
          Severity: {{ .Labels.severity }}
          Time: {{ .StartsAt }}
          {{ end }}

  - name: 'critical-alerts'
    email_configs:
      - to: '${CRITICAL_ALERT_EMAIL}'
        subject: '[CRITICAL] Odoo Dashboard: {{ .GroupLabels.alertname }}'
        body: |
          🚨 CRITICAL ALERT 🚨
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Service: {{ .Labels.service }}
          Time: {{ .StartsAt }}
          
          Immediate action required!
          {{ end }}
    webhook_configs:
      - url: '${SLACK_WEBHOOK_URL}'
        send_resolved: true
        title: 'Critical Alert: {{ .GroupLabels.alertname }}'
        text: |
          🚨 **CRITICAL ALERT** 🚨
          {{ range .Alerts }}
          **{{ .Annotations.summary }}**
          Service: {{ .Labels.service }}
          Description: {{ .Annotations.description }}
          {{ end }}

  - name: 'warning-alerts'
    email_configs:
      - to: '${WARNING_ALERT_EMAIL}'
        subject: '[WARNING] Odoo Dashboard: {{ .GroupLabels.alertname }}'
        body: |
          ⚠️ WARNING ALERT ⚠️
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Service: {{ .Labels.service }}
          Time: {{ .StartsAt }}
          {{ end }}

  - name: 'business-alerts'
    email_configs:
      - to: '${BUSINESS_ALERT_EMAIL}'
        subject: '[BUSINESS] Odoo Dashboard: {{ .GroupLabels.alertname }}'
        body: |
          📊 BUSINESS METRIC ALERT 📊
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Service: {{ .Labels.service }}
          Time: {{ .StartsAt }}
          
          This may impact business operations.
          {{ end }}
    webhook_configs:
      - url: '${TEAMS_WEBHOOK_URL}'
        send_resolved: true
        title: 'Business Alert: {{ .GroupLabels.alertname }}'
        text: |
          📊 **BUSINESS ALERT**
          {{ range .Alerts }}
          **{{ .Annotations.summary }}**
          Service: {{ .Labels.service }}
          Description: {{ .Annotations.description }}
          {{ end }}

# Templates for custom notification formatting
templates:
  - '/etc/alertmanager/templates/*.tmpl'
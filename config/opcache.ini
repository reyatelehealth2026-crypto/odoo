; PHP OPcache + JIT settings for Odoo Dashboard (aaPanel + Nginx + PHP 8.3)
;
; Deploy: aaPanel → App Store → PHP 8.3 → Config → Paste into conf
;         หรือ copy ไปที่ /www/server/php/83/conf.d/99-opcache-dashboard.ini
;
; ผลลัพธ์ที่คาดหวัง:
;   - odoo-dashboard-api.php (~182KB, 4932 บรรทัด) จาก parse 1.3s → ~0ms (cached bytecode)
;   - ทุก API endpoint เริ่มทำงานเร็วขึ้น ~50-80%
;   - JIT compiler เพิ่มความเร็วอีก 10-30% สำหรับ CPU-bound code (JSON encode, loops)

[opcache]
; ── Core settings ──
opcache.enable                  = 1
opcache.enable_cli              = 0
opcache.memory_consumption      = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files   = 10000

; ── Revalidation — production: ตั้ง 0 แล้ว clear manual หลัง deploy ──
; aaPanel: ตั้ง 60 เพื่อตรวจไฟล์ใหม่ทุก 1 นาที (ถ้ามั่นใจ deploy flow ตั้ง 0)
opcache.revalidate_freq         = 60
opcache.validate_timestamps     = 1
opcache.fast_shutdown           = 1

; ── File cache — L2 cache on disk, survives PHP-FPM restart ──
; aaPanel PHP 8.3 path: /www/server/php/83/tmp/opcache_file_cache
opcache.file_cache              = /tmp/php_opcache_file_cache
opcache.file_cache_only         = 0
opcache.file_cache_consistency_checks = 1

; ── JIT (PHP 8.0+) — tracing JIT สำหรับ hotpath optimization ──
; 1255 = tracing mode, optimize hot functions, use AVX if available
opcache.jit                     = 1255
opcache.jit_buffer_size         = 64M

; ── Preloading (optional) — โหลดไฟล์ที่ใช้บ่อยไว้ใน shared memory ──
; เปิดใช้เมื่อมี preload script พร้อม:
; opcache.preload              = /www/wwwroot/cny.re-ya.com/config/preload.php
; opcache.preload_user         = www

; ── Logging ──
opcache.log_verbosity_level     = 1
opcache.error_log               =

; ═══════════════════════════════════════════════════════
; การติดตั้งบน aaPanel:
; ═══════════════════════════════════════════════════════
;
; วิธีที่ 1: aaPanel GUI
;   1. aaPanel → App Store → PHP 8.3 → Settings → Config File
;   2. เพิ่ม content ของไฟล์นี้ท้าย php.ini
;   3. PHP 8.3 → Service → Restart
;
; วิธีที่ 2: CLI
;   cp config/opcache.ini /www/server/php/83/conf.d/99-opcache.ini
;   mkdir -p /tmp/php_opcache_file_cache
;   chown www:www /tmp/php_opcache_file_cache
;   /etc/init.d/php-fpm-83 restart
;
; ตรวจสอบสถานะ:
;   php -r "var_dump(opcache_get_status()['opcache_enabled']);"
;   php -r "var_dump(opcache_get_status()['jit']);"
;   curl https://cny.re-ya.com/install/clear_opcache.php
;
; Clear cache หลัง deploy:
;   php -r "opcache_reset();"
;   หรือ: /etc/init.d/php-fpm-83 reload

; ═══════════════════════════════════════════════════════════════════════════════
; PHP-FPM Pool Configuration for aaPanel — cny.re-ya.com
; ═══════════════════════════════════════════════════════════════════════════════
;
; Deploy: aaPanel → PHP 8.3 → FPM Config → วาง settings เหล่านี้
;         หรือ copy ไปที่ /www/server/php/83/etc/php-fpm.d/www.conf
;
; VPS Sizing Guide:
;   RAM 1GB  → max_children=10,  start_servers=3
;   RAM 2GB  → max_children=20,  start_servers=5
;   RAM 4GB  → max_children=40,  start_servers=8
;   RAM 8GB+ → max_children=80,  start_servers=15
;
; แต่ละ PHP-FPM worker ใช้ RAM ~30-50MB สำหรับ dashboard API
; ═══════════════════════════════════════════════════════════════════════════════

; ── Process Manager ──────────────────────────────────────────────────────────
; dynamic = ปรับจำนวน worker อัตโนมัติตาม load
pm = dynamic

; จำนวน worker สูงสุด — ปรับตาม RAM ของ VPS
; สูตร: (Total RAM - OS & MySQL & Redis) / 50MB per worker
pm.max_children = 20

; จำนวน worker เริ่มต้น
pm.start_servers = 5

; Worker ขั้นต่ำที่รอรับ request (idle)
pm.min_spare_servers = 3

; Worker สูงสุดที่รอรับ request (idle)
pm.max_spare_servers = 10

; รีสตาร์ท worker หลังรับ request ครบจำนวนนี้ (ป้องกัน memory leak)
pm.max_requests = 500

; Timeout สำหรับ request ที่ใช้เวลานาน (dashboard heavy queries)
request_terminate_timeout = 60s

; Slow log — บันทึก request ที่ใช้เวลาเกิน 5 วินาที
request_slowlog_timeout = 5s
slowlog = /www/wwwlogs/php/slow-cny.log

; ── PHP Settings (override per-pool) ────────────────────────────────────────
; เหล่านี้ override ค่าใน php.ini สำหรับ pool นี้
php_admin_value[memory_limit] = 256M
php_admin_value[max_execution_time] = 120
php_admin_value[upload_max_filesize] = 50M
php_admin_value[post_max_size] = 50M
php_admin_value[date.timezone] = Asia/Bangkok
php_admin_value[default_charset] = UTF-8

; Display errors off in production
php_admin_flag[display_errors] = off
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /www/wwwlogs/php/error-cny.log

; ── Realpath Cache (ลดจำนวน stat() calls) ───────────────────────────────────
; PHP ต้อง resolve file path ทุก require/include — cache ไว้ 2 นาที
php_admin_value[realpath_cache_size] = 4M
php_admin_value[realpath_cache_ttl] = 120

; ── Session (ใช้ Redis แทน files สำหรับ session storage) ────────────────────
; เปิดใช้เมื่อ Redis พร้อม:
; php_admin_value[session.save_handler] = redis
; php_admin_value[session.save_path] = "tcp://127.0.0.1:6379?database=1"

; ═══════════════════════════════════════════════════════════════════════════════
; วิธีตั้งค่าบน aaPanel:
; ═══════════════════════════════════════════════════════════════════════════════
;
; วิธีที่ 1: aaPanel GUI (แนะนำ)
;   1. aaPanel → App Store → PHP 8.3 → Settings → FPM Config
;   2. ปรับค่า pm.max_children, pm.start_servers ฯลฯ ตาม RAM ของ VPS
;   3. Save → Restart PHP-FPM
;
; วิธีที่ 2: CLI
;   nano /www/server/php/83/etc/php-fpm.d/www.conf
;   # แก้ค่าต่างๆ
;   /etc/init.d/php-fpm-83 restart
;
; ตรวจสอบ:
;   ps aux | grep php-fpm | wc -l          # จำนวน worker
;   cat /www/wwwlogs/php/slow-cny.log      # slow requests
;   /etc/init.d/php-fpm-83 status          # FPM status
; ═══════════════════════════════════════════════════════════════════════════════

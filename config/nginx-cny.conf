# ═══════════════════════════════════════════════════════════════════════════════
# Nginx Configuration for cny.re-ya.com — aaPanel PHP 8.3 + Nginx 1.24
# ═══════════════════════════════════════════════════════════════════════════════
#
# แทนที่ .htaccess ที่ไม่ทำงานบน Nginx
# ติดตั้ง: aaPanel → Website → cny.re-ya.com → Conf → วาง content นี้
#
# Version: 1.0.0
# Created: 2026-03-20
# ═══════════════════════════════════════════════════════════════════════════════

# ── FastCGI Cache Zone (วางนอก server block ใน nginx.conf หลัก) ──────────────
# aaPanel → Nginx → Config → Main Config → เพิ่มใน http {} block:
#
# fastcgi_cache_path /www/server/nginx/fastcgi_cache
#     levels=1:2
#     keys_zone=DASHBOARD:10m
#     max_size=100m
#     inactive=5m
#     use_temp_path=off;
# fastcgi_cache_key "$scheme$request_method$host$request_uri$request_body";

# ═══════════════════════════════════════════════════════════════════════════════
# วางข้างล่างนี้ใน server {} block ของ cny.re-ya.com
# (aaPanel → Website → cny.re-ya.com → Conf)
# ═══════════════════════════════════════════════════════════════════════════════

# ── Security Headers ─────────────────────────────────────────────────────────
add_header X-Content-Type-Options   nosniff always;
add_header X-Frame-Options          SAMEORIGIN always;
add_header X-XSS-Protection         "1; mode=block" always;
add_header Referrer-Policy           strict-origin-when-cross-origin always;
add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(self)" always;

# ── Gzip Compression ────────────────────────────────────────────────────────
# aaPanel มักเปิด gzip global แล้ว — block นี้เสริมให้ครอบคลุม JSON + SVG
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml
    font/woff2;

# ── Static Files — Browser Cache 30 days ────────────────────────────────────
location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options nosniff always;
    access_log off;
    try_files $uri =404;
}

# ── Dashboard Fast API — FastCGI Cache 30s ──────────────────────────────────
# Cache lightweight API responses (overview, health) ที่ nginx level
# ลด PHP-FPM load สำหรับ request ซ้ำภายใน 30 วินาที
location = /api/odoo-dashboard-fast.php {
    # Enable cache only for POST with specific actions
    # Note: aaPanel ต้องมี fastcgi_cache_path configured (ดูบน)
    set $skip_cache 1;

    # Cache health + overview_fast responses
    if ($request_body ~* "\"action\":\s*\"(health|overview_fast|orders_today_fast|customers_fast)\"") {
        set $skip_cache 0;
    }

    fastcgi_cache DASHBOARD;
    fastcgi_cache_valid 200 30s;
    fastcgi_cache_bypass $skip_cache;
    fastcgi_no_cache $skip_cache;
    add_header X-Cache-Status $upstream_cache_status;

    include enable-php-83.conf;
}

# ── SEO Rewrites ────────────────────────────────────────────────────────────
location = /sitemap.xml { rewrite ^ /sitemap.php last; }
location = /robots.txt  { rewrite ^ /robots.php last; }

# ── LIFF Legacy Redirects (301 Permanent) ───────────────────────────────────
# เปลี่ยนจาก .htaccess RewriteRule เป็น Nginx rewrite
location ~ ^/liff-(.+)\.php$ {
    # Map old liff-*.php → /liff/index.php?page=*
    rewrite ^/liff-app\.php$                   /liff/index.php?page=app permanent;
    rewrite ^/liff-appointment\.php$           /liff/index.php?page=appointment permanent;
    rewrite ^/liff-checkout\.php$              /liff/index.php?page=checkout permanent;
    rewrite ^/liff-consent\.php$               /liff/index.php?page=consent permanent;
    rewrite ^/liff-main\.php$                  /liff/index.php?page=main permanent;
    rewrite ^/liff-member-card\.php$           /liff/index.php?page=member permanent;
    rewrite ^/liff-my-appointments\.php$       /liff/index.php?page=appointments permanent;
    rewrite ^/liff-my-orders\.php$             /liff/index.php?page=orders permanent;
    rewrite ^/liff-order-detail\.php$          /liff/index.php?page=order-detail permanent;
    rewrite ^/liff-pharmacy-consult\.php$      /liff/index.php?page=consult permanent;
    rewrite ^/liff-points-history\.php$        /liff/index.php?page=points permanent;
    rewrite ^/liff-points-rules\.php$          /liff/index.php?page=points-rules permanent;
    rewrite ^/liff-product-detail\.php$        /liff/index.php?page=product permanent;
    rewrite ^/liff-promotions\.php$            /liff/index.php?page=promotions permanent;
    rewrite ^/liff-redeem-points\.php$         /liff/index.php?page=redeem permanent;
    rewrite ^/liff-register\.php$              /liff/index.php?page=register permanent;
    rewrite ^/liff-settings\.php$              /liff/index.php?page=settings permanent;
    rewrite ^/liff-share\.php$                 /liff/index.php?page=share permanent;
    rewrite ^/liff-shop\.php$                  /liff/index.php?page=shop permanent;
    rewrite ^/liff-shop-v3\.php$               /liff/index.php?page=shop permanent;
    rewrite ^/liff-symptom-assessment\.php$    /liff/index.php?page=symptom permanent;
    rewrite ^/liff-video-call\.php$            /liff/index.php?page=video-call permanent;
    rewrite ^/liff-video-call-pro\.php$        /liff/index.php?page=video-call permanent;
    rewrite ^/liff-wishlist\.php$              /liff/index.php?page=wishlist permanent;
}

# ── Retail API — Front Controller ───────────────────────────────────────────
# แทน retail-api/.htaccess RewriteRule
location /retail-api/ {
    # CORS headers
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
    add_header Access-Control-Max-Age "86400" always;

    if ($request_method = 'OPTIONS') {
        return 204;
    }

    try_files $uri /retail-api/index.php?endpoint=$uri&$args;
}

# ── Block Sensitive Files ───────────────────────────────────────────────────
# Dotfiles (.env, .git, .htaccess)
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

# Config files
location ~ /config\.php$ {
    deny all;
}

# Lock files
location ~ installed\.lock$ {
    deny all;
}

# Composer files
location ~ ^/(composer\.(json|lock)|vendor/) {
    deny all;
}

# Upload directory — ป้องกัน PHP execution
location ~ ^/uploads/.*\.php$ {
    deny all;
}

# ── Clean URLs — strip .php extension ───────────────────────────────────────
# เช่น /broadcast → broadcast.php, /api/orders → api/orders.php
# แทน .htaccess RewriteRule clean URLs
location / {
    # Try: exact file → with .php → directory → 404
    try_files $uri $uri.php $uri/ =404;
}

# ── PHP Processing (aaPanel default, adjust path if needed) ─────────────────
location ~ \.php$ {
    # aaPanel มี include enable-php-83.conf; อยู่แล้ว
    # ถ้า config ของ aaPanel ยังไม่มี block นี้ ให้เพิ่ม:
    include enable-php-83.conf;

    # เพิ่ม security headers สำหรับ PHP responses
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
}

# ── PHP-FPM Settings ────────────────────────────────────────────────────────
# aaPanel จัดการผ่าน .user.ini (PHP-FPM อ่าน .user.ini ได้) ซึ่งมีอยู่แล้วใน repo
# ดู config/php-fpm-pool.conf สำหรับ worker tuning

# ═══════════════════════════════════════════════════════════════════════════════
# วิธีติดตั้งบน aaPanel:
# ═══════════════════════════════════════════════════════════════════════════════
#
# 1. เปิด aaPanel → Website → cny.re-ya.com → Conf
# 2. ค้นหา "location / {" เดิม ลบออก
# 3. วาง content ตั้งแต่ "# ── Security Headers" ถึง "}" สุดท้าย
# 4. Save → aaPanel จะ reload Nginx อัตโนมัติ
#
# สำหรับ FastCGI Cache:
# 5. aaPanel → Nginx → Config → Main Config
# 6. เพิ่ม fastcgi_cache_path ใน http {} block (ดูด้านบน)
# 7. Save → Restart Nginx
#
# ทดสอบ:
#   curl -I https://cny.re-ya.com/broadcast     # ต้องได้ 200 (clean URL)
#   curl -I https://cny.re-ya.com/.env          # ต้องได้ 403
#   curl -I https://cny.re-ya.com/odoo-dashboard.min.js  # ต้องมี Cache-Control
#   curl -I https://cny.re-ya.com/api/odoo-dashboard-fast.php  # ดู X-Cache-Status
# ═══════════════════════════════════════════════════════════════════════════════

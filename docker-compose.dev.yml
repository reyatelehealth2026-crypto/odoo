# Docker Compose for Odoo Dashboard Development Environment
# Provides hot reload, debugging, and development tools

version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: odoo-dashboard-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-telepharmacy}
      MYSQL_USER: ${DB_USER:-telepharmacy}
      MYSQL_PASSWORD: ${DB_PASSWORD:-telepharmacy123}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-time-zone='+07:00'
      --sql-mode=STRICT_TRANS_TABLES,NO_ZERO_DATE,NO_ZERO_IN_DATE,ERROR_FOR_DIVISION_BY_ZERO
    networks:
      - odoo-dashboard-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: odoo-dashboard-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - odoo-dashboard-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Backend API (Node.js + Fastify)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder  # Use builder stage for development
    container_name: odoo-dashboard-backend-dev
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://${DB_USER:-telepharmacy}:${DB_PASSWORD:-telepharmacy123}@mysql:3306/${DB_NAME:-telepharmacy}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      API_PORT: 4000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/prisma:/app/prisma:ro
      - backend_node_modules:/app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - odoo-dashboard-network
    command: npm run dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder  # Use builder stage for development
    container_name: odoo-dashboard-frontend-dev
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: http://localhost:3001
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend
    networks:
      - odoo-dashboard-network
    command: npm run dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  # WebSocket Server (Socket.io)
  websocket:
    build:
      context: .
      dockerfile: Dockerfile.websocket
    container_name: odoo-dashboard-websocket-dev
    environment:
      NODE_ENV: development
      WEBSOCKET_PORT: 3001
      WEBSOCKET_HOST: 0.0.0.0
      DB_HOST: mysql
      DB_USER: ${DB_USER:-telepharmacy}
      DB_PASSWORD: ${DB_PASSWORD:-telepharmacy123}
      DB_NAME: ${DB_NAME:-telepharmacy}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:4000
    ports:
      - "3001:3001"
    volumes:
      - ./websocket-server.js:/app/websocket-server.js:ro
      - websocket_node_modules:/app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - odoo-dashboard-network
    command: npm run dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nginx Reverse Proxy (Development)
  nginx:
    image: nginx:alpine
    container_name: odoo-dashboard-nginx-dev
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - websocket
    networks:
      - odoo-dashboard-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data_dev:
    driver: local
  redis_data_dev:
    driver: local
  backend_node_modules:
    driver: local
  frontend_node_modules:
    driver: local
  frontend_next:
    driver: local
  websocket_node_modules:
    driver: local

networks:
  odoo-dashboard-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16